# codemagic.yaml
workflows:
  ios-workflow:
    name: Trimswipe iOS Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - Env 
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.fiskerik.trimswipe"
      xcode: latest
      cocoapods: default
      node: 22.12.0
      vars:
        BUNDLE_ID: "com.eaconsulting.trimswipe"
        APP_MARKETING_VERSION: "1.0.8"
        EXPO_PUBLIC_RC_KEY: "@rc_api_key"
        EXPO_PUBLIC_RC_ENTITLEMENT_ID: "@rc_entitlement_id"
        EXPO_PUBLIC_RC_LIFETIME_PRODUCT_ID: "@rc_product_id"
        EXPO_PUBLIC_ADMOB_USE_TEST_ADS: "true"
        EXPO_NO_TYPESCRIPT_SETUP: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    integrations:
      app_store_connect: Codemagic Key 
    scripts:
      - name: Build Root Mobile SPA Bundle
        script: |
          echo "=== Building root mobile web bundle ==="
          npm install
          npm run build:mobile-spa

      - name: Install Mobile Project Dependencies
        script: |
          cd mobile/mobile
          npm install

      - name: Expo Prebuild (Generate Native Directories)
        script: |
          cd mobile/mobile
          npx expo prebuild --platform ios --no-install

      - name: Initialize signing certificates
        script: |
          app-store-connect fetch-signing-files "com.fiskerik.trimswipe" --project-type ios
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          cd mobile/mobile/ios
          pod install
          xcode-project build-ipa --workspace *.xcworkspace --scheme "Trimswipe"
    artifacts:
      - mobile/mobile/ios/build/SignIns/*.ipa
    publishing:
      email:
        recipients:
          - erik.abrahamsson@live.com
      app_store_connect:
        auth: integration
